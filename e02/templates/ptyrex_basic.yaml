apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate
metadata:
  name: ptyrex-submission
  labels:
    workflows.diamond.ac.uk/science-group-imaging: "true"
  annotations:
    workflows.argoproj.io/title: Simple Ptyrex job submission
    workflows.argoproj.io/description: |
      Submit a Ptyrex job for a particular scan and projection within a given visit
    workflows.diamond.ac.uk/repository: "https://github.com/DiamondLightSource/imaging-workflows"
    workflows.diamond.ac.uk/parameter-schema: |
      {{- .Files.Get "schema/ptyrex_Schema.json" | nindent 6}} 
    workflows.diamond.ac.uk/ui-schema: |
      {{- .Files.Get "schema/ptyrex_ui.json" | nindent 6}} 
spec:
  entrypoint: ptyrex-container
  arguments:
    parameters:
    - name: visitdir
      valueFrom:
        configMapKeyRef:
         name: sessionspaces
         key: data_directory
  volumes:
  - name: session
    hostPath:
      path: "{{`{{ workflows.parameters.visitdir}}`}}"
      type: Directory
  volumeClaimTemplates:
  - metadata:
      name: tmpdir
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources: 
        requests:
          storage: 1Gi
      storageClassName: netapp
  templates:
  - name: ptyrex-container
    inputs:
      parameters:
      - name: config_json
        value: "{{`{{workflow.parameters.config_json}}`}}"
      - name: scan_number
        value: "{{`{{workflow.parameters.scan_number}}`}}"
      - name: projection_start
        value: "{{`{{workflow.parameters.proj_number}}`}}"
      - name: nprocs
        value: "{{`{{workflow.parameters.nprocs}}`}}"
      - name: memory
        value: "{{`{{ workflow.parameters.memory }}`}}" 
    container:
      image: gitlab.diamond.ac.uk:5050/scisoft/ptychography/dimtools/ptyrex:latest
      imagePullPolicy: Always
      env:
      - name: CUPY_CACHE_DIR
        value: /tmp/.cupy/kernel_cache
      - name: MKL_NUM_THREADS
        value: "1"
      - name: NUMEXPR_NUM_THREADS
        value: "1"
      - name: OMP_NUM_THREADS
        value: "1"
      command: 
      - "/opt/conda/bin/mpirun"
      args: 
      - "-np"
      - "{{`{{ inputs.parameters.nprocs }}`}}"
      - "/home/ptyrex_recon"
      - "-c"
      - "{{`{{ inputs.parameters.config_json }}`}}"
      - "-s"
      - "{{`{{ inputs.parameters.scan_number }}`}}"
      - "-p"
      - "{{`{{ inputs.parameters.proj_number }}`}}"

      volumeMounts:
      - name: tmpdir
        mountPath: /tmp
      - name: session
        mountPath: "{{`{{ workflow.parameters.visitdir }}`}}"
    podSpecPatch: |
      containers:
      - name: main
        resources:
          requests:
            cpu: "{{`{{ inputs.parameters.nprocs }}`}}"
            memory: "{{`{{ inputs.parameters.memory }}`}}"
            nvidia.com/gpu: "{{`{{ inputs.parameters.nprocs }}`}}"
          limits:
            cpu: "{{`{{ inputs.parameters.nprocs }}`}}"
            memory: "{{`{{ inputs.parameters.memory }}`}}"
            nvidia.com/gpu: "{{`{{ inputs.parameters.nprocs }}`}}"
    tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
    - key: nodetype
      operator: Equal
      value: gpu
      effect: NoSchedule
    - key: nodegroup
      operator: Equal
      value: workflows
      effect: NoSchedule
    volumes:
    - name: session
      hostPath:
        path:  "{{`{{ workflow.parameters.visitdir }}`}}"
        type: Directory

