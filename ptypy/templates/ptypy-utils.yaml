apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate
metadata:
  name: ptypy-utils
  labels:
    workflows.diamond.ac.uk/science-group-imaging: "true"
  annotations:
    workflows.diamond.ac.uk/repository: "https://github.com/DiamondLightSource/imaging-workflows"
spec:
  entrypoint: ptypy-plotting
  volumeClaimTemplates:
  - metadata:
      name: tmpdir
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi
      storageClassName: netapp
  arguments:
    parameters:
    - name: visitdir
      valueFrom:
        configMapKeyRef:
          name: sessionspaces
          key: data_directory
  templates:
  - name: ptypy-plotting
    inputs:
      parameters:
      - name: filepath
    script:
      image: ghcr.io/diamondlightsource/imaging_toolbox/ptypy_workflows:0.3.3
      env:
      - name: MKL_NUM_THREADS
        value: "1"
      - name: NUMEXPR_NUM_THREADS
        value: "1"
      - name: OMP_NUM_THREADS
        value: "1"
      command: [bash]
      source: |
        # mount notebook
        echo '{{ .Files.Get "notebooks/ptypy_plotting.ipynb" | b64enc }}' | base64 -d > /tmp/notebook.ipynb
        # run notebook
        python -m papermill /tmp/notebook.ipynb /tmp/notebook.ipynb \
          -p recon_file "{{`{{ inputs.parameters.filepath }}`}}"
        python -m nbconvert --to html --output notebook --output-dir /tmp /tmp/notebook.ipynb
      volumeMounts:
      - name: session
        mountPath: "{{`{{ workflow.parameters.visitdir }}`}}"
      - name: tmpdir
        mountPath: /tmp
    outputs:
      artifacts:
      - name: notebook
        path: /tmp/notebook.html
        archive:
          none: {}
      - name: amplitude
        path: /tmp/amplitude_plot.png
        archive:
          none: {}
      - name: phase
        path: /tmp/phase_plot.png
        archive:
          none: {}
      - name: probe-amplitude
        path: /tmp/probe_amplitude_plot.png
        archive:
          none: {}
      - name: probe-phase
        path: /tmp/probe_phase_plot.png
        archive:
          none: {}
      - name: errors
        path: /tmp/error_plot.png
        archive:
          none: {}
    podSpecPatch: |
      containers:
      - name: main
        resources:
          requests:
            cpu: 1
            memory: 20Gi
          limits:
            cpu: 1
            memory: 20Gi
    tolerations:
    - key: nodegroup
      operator: Equal
      value: workflows
      effect: NoSchedule
    affinity:
      nodeAffinity:
       preferredDuringSchedulingIgnoredDuringExecution:
       - weight: 100
         preference:
           matchExpressions:
           - key: nodegroup
             operator: In
             values:
             - workflows
    volumes:
    - name: session
      hostPath:
        path:  "{{`{{ workflow.parameters.visitdir }}`}}"
        type: Directory
