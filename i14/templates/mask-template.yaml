apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate
metadata:
  name: mask
  labels:
    workflows.diamond.ac.uk/science-group-imaging: "true"
  annotations:
    workflows.argoproj.io/title: Generate a Mask
    workflows.argoproj.io/description: |
      A utility which takes in a file, such as one with complex or phase information, creates a mask, and saves the results.
    workflows.diamond.ac.uk/repository: "https://github.com/DiamondLightSource/imaging-workflows"
    workflows.diamond.ac.uk/parameter-schema: |
      {{- .Files.Get "schema/maskSchema.json" | nindent 6 }}
    workflows.diamond.ac.uk/ui-schema: |
      {{- .Files.Get "schema/maskUISchema.json" | nindent 6 }}
spec:
  entrypoint: mask
  arguments:
    parameters:
    - name: visitdir
      valueFrom:
        configMapKeyRef:
          name: sessionspaces
          key: data_directory
    - name: inpath
      value: ""
    - name: outpath
      value: ""
    - name: padding
      value: 50
    - name: minSize
      value: 5000
    - name: erosionRadius
      value: 18
    - name: dilationRadius
      value: 5
  volumeClaimTemplates:
  - metadata:
      name: tmp
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 20Gi
      storageClassName: netapp
  templates:
  - name: mask-mount-files
    script:
      image: gitlab.diamond.ac.uk:5050/i14/i14_utility/xrd:v0.1
      command: [bash]
      source: |
        echo '{{ .Files.Get "notebooks/ptycho-tomo-mask.ipynb" | b64enc }}' | base64 -d > /tmp/notebook.ipynb
      volumeMounts:
      - name: tmp
        mountPath: /tmp
  - name: mask-notebook
    inputs:
      parameters:
      - name: inpath
        value: "{{`{{ workflow.parameters.inpath }}`}}"
      - name: outpath
        value: "{{`{{ workflow.parameters.outpath }}`}}"
      - name: padding
        value: "{{`{{ workflow.parameters.padding }}`}}"
      - name: minSize
        value: "{{`{{ workflow.parameters.minSize }}`}}"
      - name: erosionRadius
        value: "{{`{{ workflow.parameters.erosionRadius }}`}}"
      - name: dilationRadius
        value: "{{`{{ workflow.parameters.dilationRadius }}`}}"
    script:
      image: gitlab.diamond.ac.uk:5050/i14/i14_utility/xrd:v0.1
      env:
      - name: HOME
        value: /tmp
      command: [bash]
      source: |
        ERROR_TXT="raise error"
        ERROR_STR="An error arose within the executed notebook. Please open the output file to check."
        OUTPUT="{{`{{ inputs.parameters.outpath }}`}}"
        mkdir -p $OUTPUT

        python -m papermill /tmp/notebook.ipynb $OUTPUT/mask-notebook.ipynb \
          -p inpath "{{`{{ inputs.parameters.inpath }}`}}" \
          -p outpath "{{`{{ inputs.parameters.outpath }}`}}" \
          -p padding "{{`{{ inputs.parameters.padding }}`}}" \
          -p min_size "{{`{{ inputs.parameters.minSize }}`}}" \
          -p erosion_radius "{{`{{ inputs.parameters.erosionRadius }}`}}" \
          -p dilation_radius "{{`{{ inputs.parameters.dilationRadius }}`}}" \
          > $OUTPUT/papermill.log 2>&1

        python -m jupyter nbconvert $OUTPUT/mask-notebook.ipynb \
          --to html --output mask-output \
          --output-dir $OUTPUT

        grep -q "$ERROR_TXT" "$OUTPUT/papermill.log" && { echo "$ERROR_STR" >&2; exit 1; } || exit 0
        # Raise an exit code to display failure of task if error text found in log

      volumeMounts:
      - name: session
        mountPath: "{{`{{ workflow.parameters.visitdir }}`}}"
      - name: tmp
        mountPath: /tmp
    outputs:
      artifacts:
      - name: mask-notebook
        path: "{{`{{ inputs.parameters.outpath }}`}}/mask-notebook.ipynb"
        archive:
          none: {}
      - name: mask-output
        path: "{{`{{ inputs.parameters.outpath }}`}}/mask-output.html"
        archive:
          none: {}
      - name: notebook-log
        path: "{{`{{ inputs.parameters.outpath }}`}}/papermill.log"
        archive:
          none: {}
    podSpecPatch: |
      containers:
      - name: main
        resources:
          requests:
            cpu: 10
            memory: 30Gi
          limits:
            cpu: 10
            memory: 30Gi
    tolerations:
    - key: nodegroup
      operator: Equal
      value: workflows
      effect: NoSchedule
    affinity:
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
            - key: nodegroup
              operator: In
              values:
              - workflows
    volumes:
    - name: session
      hostPath:
        path: "{{`{{ workflow.parameters.visitdir }}`}}"
        type: Directory
  - name: mask
    dag:
      tasks:
      - name: setup
        template: mask-mount-files
      - name: run-mask-notebook
        template: mask-notebook
        dependencies: [setup]
